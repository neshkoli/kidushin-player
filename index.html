<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שולחן ערוך - הלכות קידושין</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4ede0;
      color: #2c1810;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #5c3d1e;
      margin-bottom: 24px;
      text-align: center;
    }

    /* ── Player Card ── */
    .player-card {
      background: #fdf8f0;
      border: 1px solid #d4b896;
      border-radius: 20px;
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(100, 65, 20, 0.13);
      margin-bottom: 28px;
    }

    .now-playing-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9a7550;
      margin-bottom: 8px;
    }

    .track-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: #2c1810;
      min-height: 1.5em;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    /* ── Progress ── */
    .progress-wrap {
      margin-bottom: 6px;
    }

    .progress-bar-bg {
      width: 100%;
      height: 5px;
      background: #e0cdb4;
      border-radius: 99px;
      cursor: pointer;
      position: relative;
    }

    .progress-bar-fill {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      background: linear-gradient(270deg, #8b6234, #c99b5a);
      border-radius: 99px;
      width: 0%;
      transition: width 0.2s linear;
      pointer-events: none;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: #9a7550;
      margin-top: 6px;
      margin-bottom: 20px;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #8b6234;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: color 0.2s, transform 0.1s;
      padding: 6px;
    }

    .ctrl-btn:hover { color: #5c3d1e; transform: scale(1.1); }
    .ctrl-btn:active { transform: scale(0.95); }

    .ctrl-btn svg { display: block; }

    .play-btn {
      background: linear-gradient(135deg, #8b6234, #c99b5a);
      color: #fff;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(139, 98, 52, 0.35);
    }

    .play-btn:hover { color: #fff; background: linear-gradient(135deg, #9d7240, #d4a86a); }

    /* ── Track List ── */
    .track-list {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .section-header {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #7a5230;
      text-transform: uppercase;
      padding: 10px 4px 2px;
      border-bottom: 1px solid #d4b896;
      margin-bottom: 2px;
    }

    .section-header:not(:first-child) {
      margin-top: 10px;
    }

    .group-header {
      font-size: 0.88rem;
      font-weight: 700;
      color: #5c3d1e;
      padding: 8px 4px 2px;
      border-bottom: 1px dashed #d4b896;
      margin-bottom: 2px;
    }

    .track-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      background: #f0e6d4;
      border: 1px solid #d4b896;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .track-item:hover {
      background: #e8d9c2;
      border-color: #b89060;
    }

    .track-item.active {
      background: linear-gradient(135deg, #ecdfc8, #f5ece0);
      border-color: #8b6234;
    }

    .track-num {
      font-size: 0.78rem;
      color: #9a7550;
      min-width: 22px;
      text-align: center;
    }

    .track-item.active .track-num {
      color: #5c3d1e;
    }

    .track-name {
      flex: 1;
      font-size: 0.92rem;
      color: #4a3220;
      line-height: 1.4;
    }

    .track-item.active .track-name {
      color: #2c1810;
      font-weight: 600;
    }

    .playing-indicator {
      display: none;
      align-items: center;
      gap: 2px;
    }

    .track-item.active.playing .playing-indicator {
      display: flex;
    }

    .playing-indicator span {
      display: inline-block;
      width: 3px;
      background: #8b6234;
      border-radius: 2px;
      animation: bounce 0.8s ease-in-out infinite;
    }

    .playing-indicator span:nth-child(1) { height: 10px; animation-delay: 0s; }
    .playing-indicator span:nth-child(2) { height: 16px; animation-delay: 0.15s; }
    .playing-indicator span:nth-child(3) { height: 8px; animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1); }
    }

    audio { display: none; }
  </style>
</head>
<body>

  <h1>שולחן ערוך - הלכות קידושין</h1>

  <div class="player-card">
    <div class="now-playing-label">Now Playing</div>
    <div class="track-title" id="trackTitle">Select a track to begin</div>

    <div class="progress-wrap">
      <div class="progress-bar-bg" id="progressBg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-times">
        <span id="timeCurrent">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="btnPrev" title="Previous">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zm2-8.14 5.02 2.14L8 14.14V9.86zM16 6h2v12h-2z"/>
        </svg>
      </button>

      <button class="ctrl-btn play-btn" id="btnPlay" title="Play / Pause">
        <svg id="iconPlay" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="iconPause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
        </svg>
      </button>

      <button class="ctrl-btn" id="btnNext" title="Next">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="track-list" id="trackList"></div>

  <footer style="margin-top: 32px; text-align: center; font-size: 0.75rem; color: #9a7550; line-height: 1.8;">
    <div>© אפרים שרם וחננאל תורגמן</div>
    <div>
      <a href="mailto:shremim@gmail.com" style="color: #8b6234; text-decoration: none;">shremim@gmail.com</a>
      &nbsp;|&nbsp;
      <a href="mailto:hananelt@gmail.com" style="color: #8b6234; text-decoration: none;">hananelt@gmail.com</a>
    </div>
  </footer>

  <audio id="audioEl"></audio>

  <script>
    const audio = document.getElementById('audioEl');
    const trackTitle = document.getElementById('trackTitle');
    const progressFill = document.getElementById('progressFill');
    const progressBg = document.getElementById('progressBg');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeDuration = document.getElementById('timeDuration');
    const btnPlay = document.getElementById('btnPlay');
    const iconPlay = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');
    const trackList = document.getElementById('trackList');

    let tracks = [];       // flat array of filenames, in JSON order
    let trackNames = [];   // display name (סימן + שם) for each track
    let currentIndex = -1;
    let isPlaying = false;

    function fmt(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${sec}`;
    }

    function getItems() {
      return document.querySelectorAll('.track-item');
    }

    function buildList(data) {
      let globalIndex = 0;

      for (const [sefer, sections] of Object.entries(data)) {
        // Top-level sefer header (אבן העזר / חושן משפט)
        const sectionEl = document.createElement('div');
        sectionEl.className = 'section-header';
        sectionEl.textContent = sefer;
        trackList.appendChild(sectionEl);

        for (const [halakha, entries] of Object.entries(sections)) {
          // הלכות... group header
          const groupEl = document.createElement('div');
          groupEl.className = 'group-header';
          groupEl.textContent = halakha;
          trackList.appendChild(groupEl);

          for (const entry of entries) {
            const idx = globalIndex++;
            tracks.push(entry.file);
            const displayLabel = `סימן ${entry['סימן']} – ${entry['שם']}`;
            trackNames.push(displayLabel);

            const item = document.createElement('div');
            item.className = 'track-item';
            item.dataset.index = idx;
            item.innerHTML = `
              <span class="track-num">${idx + 1}</span>
              <span class="track-name">${displayLabel}</span>
              <span class="playing-indicator">
                <span></span><span></span><span></span>
              </span>`;
            item.addEventListener('click', () => loadTrack(idx, true));
            trackList.appendChild(item);
          }
        }
      }
    }

    function loadTrack(index, autoPlay = false) {
      if (index < 0 || index >= tracks.length) return;

      getItems().forEach(el => el.classList.remove('active', 'playing'));
      currentIndex = index;
      const activeEl = getItems()[index];
      activeEl.classList.add('active');
      activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      audio.src = encodeURIComponent(tracks[index]);
      trackTitle.textContent = trackNames[index];
      progressFill.style.width = '0%';
      timeCurrent.textContent = '0:00';
      timeDuration.textContent = '0:00';

      if (autoPlay) {
        audio.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
      } else {
        setPlaying(false);
      }
    }

    function setPlaying(state) {
      isPlaying = state;
      iconPlay.style.display = state ? 'none' : 'block';
      iconPause.style.display = state ? 'block' : 'none';

      getItems().forEach((el, i) => {
        if (i === currentIndex && state) el.classList.add('playing');
        else el.classList.remove('playing');
      });
    }

    btnPlay.addEventListener('click', () => {
      if (currentIndex === -1) { loadTrack(0, true); return; }
      if (isPlaying) {
        audio.pause();
        setPlaying(false);
      } else {
        audio.play().then(() => setPlaying(true));
      }
    });

    document.getElementById('btnPrev').addEventListener('click', () => {
      if (currentIndex <= 0) loadTrack(tracks.length - 1, isPlaying);
      else loadTrack(currentIndex - 1, isPlaying);
    });

    document.getElementById('btnNext').addEventListener('click', () => {
      if (currentIndex >= tracks.length - 1) loadTrack(0, isPlaying);
      else loadTrack(currentIndex + 1, isPlaying);
    });

    audio.addEventListener('ended', () => {
      if (currentIndex < tracks.length - 1) loadTrack(currentIndex + 1, true);
      else { loadTrack(0, false); }
    });

    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      timeCurrent.textContent = fmt(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata', () => {
      timeDuration.textContent = fmt(audio.duration);
    });

    // Seek on click — RTL: right edge = start, left edge = end
    progressBg.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = progressBg.getBoundingClientRect();
      const ratio = (rect.right - e.clientX) / rect.width;
      audio.currentTime = ratio * audio.duration;
    });

    // Track data (inlined from tracks.json to support file:// URLs)
    const TRACKS_DATA = {
      "אבן העזר": {
        "הלכות קידושין": [
          { "סימן": "כו",  "שם": "במה אישה מתקדשת",                    "file": "סימן כו אבן העזר.mp3" },
          { "סימן": "כז",  "שם": "לשון הקידושין ונתינתם",              "file": "סימן כז אבן העזר.mp3" },
          { "סימן": "כט",  "שם": "סוגים שונים של נתינת קידושין",       "file": "סימן כט אבן העזר.mp3" },
          { "סימן": "לד",  "שם": "ברכת האירוסין",                      "file": "סימן לד אבן העזר.mp3" },
          { "סימן": "מב",  "שם": "קידושין לרצון האישה ובפני שני עדים", "file": "סימן מב אבן העזר.mp3" }
        ],
        "הלכות נישואים": [
          { "סימן": "סא",  "שם": "חופת נידה",                          "file": "סימן סא אבן העזר - חופת נידה.mp3" },
          { "סימן": "סב",  "שם": "ברכת חתנים",                         "file": "סימן סב אבן העזר - ברכת חתנים.mp3" },
          { "סימן": "סג",  "שם": "דיני כלה הנכנסת לחופה",             "file": "סימן סג אהן העזר - כלה הנכנסת לחופה.mp3" },
          { "סימן": "סד",  "שם": "זמן הנישואים וימי השמחה",            "file": "סימן סד אבן העזר - זמן ימי השמחה.mp3" },
          { "סימן": "סה",  "שם": "שמחת חתן וכלה",                      "file": "סימן סה אבן העזר - שמחת חתן וכלה.mp3" }
        ],
        "הלכות כתובה": [
          { "סימן": "סו",  "שם": "הלכות כתובה",                        "file": "סימן סו אבן העזר.mp3" },
          { "סימן": "קכו", "שם": "דנשים בכתיבת גט (וכתובה)",          "file": "סימן קכו אבן העזר.mp3" }
        ]
      },
      "חושן משפט": {
        "הלכות עדות": [
          { "סימן": "לג",  "שם": "פסולי עדות מחמת קרבה",              "file": "סימן לג חושן משפט - עדים קרובים.mp3" },
          { "סימן": "לד",  "שם": "פסולי עדות מחמת עבירה",             "file": "סימן לד חושן משפט פסולי העדים.mp3" },
          { "סימן": "מב",  "שם": "דברים הכתובים בשטר",                "file": "סימן מב חושן משפט.mp3" },
          { "סימן": "מד",  "שם": "קיום שטרות",                         "file": "סימן מד חושן משפט.mp3" },
          { "סימן": "מט",  "שם": "שמות בשטרות",                        "file": "סימן מט חושן משפט.mp3" }
        ]
      }
    };

    buildList(TRACKS_DATA);
  </script>
</body>
</html>
